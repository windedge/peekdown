name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release
      - name: Package
        run: Compress-Archive -Path target/release/peekdown.exe -DestinationPath target/release/peekdown-${{ github.ref_name }}.zip
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/peekdown.exe
            target/release/peekdown-${{ github.ref_name }}.zip
          generate_release_notes: true
